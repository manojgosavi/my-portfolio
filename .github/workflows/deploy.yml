name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to manojgosavi.github.io
        run: |
          git clone https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/manojgosavi/manojgosavi.github.io.git /tmp/pages
          cp -r dist/. /tmp/pages/
          touch /tmp/pages/.nojekyll
          cd /tmp/pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy from my-portfolio@${{ github.sha }}"
          git push origin main
